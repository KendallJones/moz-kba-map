<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Key Biodiversity Areas — Mozambique</title>

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Source+Serif+4:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">

  <style>
    :root {
      --forest:   #1a3a2a;
      --canopy:   #2d5a3d;
      --leaf:     #4a8c5c;
      --moss:     #7ab893;
      --mist:     #c8dfd0;
      --sand:     #f0ebe0;
      --bark:     #8b6f47;
      --ember:    #c4541a;
      --sky:      #e8f4f0;
      --ink:      #1a2620;
      --panel-w:  630px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Source Serif 4', Georgia, serif;
      background: var(--forest);
      color: var(--ink);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Language Modal ─────────────────────────────────────────────────── */
    #lang-modal {
      position: fixed; inset: 0;
      background: rgba(10, 26, 18, 0.97);
      z-index: 9999;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 32px;
    }

    .lang-modal-title {
      font-family: 'Playfair Display', serif;
      color: var(--sand);
      font-size: 1.6rem;
      font-weight: 600;
      letter-spacing: 0.02em;
      text-align: center;
      line-height: 1.4;
    }

    .lang-modal-subtitle {
      color: var(--moss);
      font-size: 0.85rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      text-align: center;
      margin-top: -20px;
    }

    .lang-buttons {
      display: flex;
      gap: 20px;
    }

    .lang-btn {
      background: var(--canopy);
      color: var(--sand);
      border: 2px solid var(--leaf);
      font-family: 'Playfair Display', serif;
      font-size: 1.1rem;
      font-weight: 600;
      padding: 14px 40px;
      border-radius: 4px;
      cursor: pointer;
      letter-spacing: 0.04em;
      transition: background 0.2s, border-color 0.2s, transform 0.15s;
    }
    .lang-btn:hover {
      background: var(--leaf);
      border-color: var(--moss);
      transform: translateY(-2px);
    }

    .lang-modal-logos {
      display: flex;
      align-items: center;
      gap: 20px;
      margin-top: 12px;
      opacity: 0.6;
    }
    .lang-modal-logos img { height: 28px; width: auto; object-fit: contain; }

    /* ── Header ─────────────────────────────────────────────────────────── */
    header {
      background: var(--forest);
      color: var(--mist);
      padding: 0 28px;
      height: 58px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
      border-bottom: 1px solid var(--canopy);
      z-index: 1000;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .header-emblem {
      width: 32px; height: 32px;
      background: var(--leaf);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px;
    }

    header h1 {
      font-family: 'Playfair Display', serif;
      font-size: 1.1rem;
      font-weight: 600;
      letter-spacing: 0.01em;
      color: var(--sand);
    }

    header p.subtitle {
      font-size: 0.72rem;
      color: var(--moss);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-style: italic;
    }

    .site-count {
      font-size: 0.78rem;
      color: var(--moss);
      border: 1px solid var(--canopy);
      padding: 4px 12px;
      border-radius: 20px;
      letter-spacing: 0.05em;
    }

    .site-count span { color: var(--mist); font-weight: 600; }

    .header-right {
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .header-logos {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .header-logos img {
      height: 36px;
      width: auto;
      object-fit: contain;
    }

    /* ── Layout ─────────────────────────────────────────────────────────── */
    .app-body {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── Map ─────────────────────────────────────────────────────────────── */
    #map {
      flex: 1;
      background: var(--sky);
    }

    /* ── Side Panel ─────────────────────────────────────────────────────── */
    #side-panel {
      width: var(--panel-w);
      background: var(--sand);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      border-left: 3px solid var(--leaf);
      transform: translateX(var(--panel-w));
      transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      flex-shrink: 0;
    }

    #side-panel.open { transform: translateX(0); }

    .panel-close {
      position: absolute;
      top: 10px; right: 10px;
      background: rgba(26,58,42,0.7);
      border: 1px solid var(--canopy);
      color: var(--mist);
      width: 28px; height: 28px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 13px;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.2s;
      z-index: 10;
    }
    .panel-close:hover { background: var(--ember); border-color: var(--ember); color: white; }

    /* Satellite image at top of panel */
    .panel-satellite {
      position: relative;
      height: 180px;
      background: var(--canopy);
      overflow: hidden;
      flex-shrink: 0;
    }

    .panel-satellite img {
      width: 100%; height: 100%;
      object-fit: contain;
      background: #0a1a10;
    }

    .panel-satellite .sat-placeholder {
      width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
      background: linear-gradient(160deg, var(--canopy) 0%, var(--forest) 100%);
      color: var(--moss);
      font-size: 0.75rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    /* KBA badge on satellite image */
    .kba-badge {
      position: absolute;
      top: 10px; left: 10px;
      background: var(--ember);
      color: white;
      font-size: 0.6rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 3px 8px;
      border-radius: 2px;
    }

    /* Panel body */
    .panel-body {
      flex: 1;
      overflow-y: auto;
      padding: 18px 22px 32px;
    }

    .panel-body::-webkit-scrollbar { width: 4px; }
    .panel-body::-webkit-scrollbar-thumb { background: var(--mist); border-radius: 2px; }

    .site-name {
      font-family: 'Playfair Display', serif;
      font-size: 1.35rem;
      font-weight: 700;
      color: var(--forest);
      line-height: 1.25;
      margin-bottom: 3px;
    }

    .site-region {
      font-size: 0.73rem;
      color: var(--bark);
      letter-spacing: 0.07em;
      text-transform: uppercase;
      margin-bottom: 14px;
    }

    /* 2×2 meta grid */
    .meta-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 5px;
      margin-bottom: 12px;
    }

    .meta-item {
      background: #eef5ef;
      border-radius: 5px;
      padding: 7px 10px;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .meta-label {
      font-size: 0.6rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--leaf);
    }

    .meta-val {
      font-size: 0.8rem;
      color: var(--forest);
    }

    /* Criteria badges */
    .criteria-row {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      margin-bottom: 14px;
    }

    .criteria-badge {
      background: var(--forest);
      color: var(--mist);
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      padding: 3px 9px;
      border-radius: 3px;
    }

    .divider {
      height: 1px;
      background: var(--mist);
      margin: 14px 0;
    }

    .section-label {
      font-size: 0.63rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--leaf);
      margin-bottom: 6px;
    }

    .section-text {
      font-size: 0.85rem;
      line-height: 1.65;
      color: #2a3a30;
    }

    /* Threats */
    .threats-list {
      list-style: none;
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
    }

    .threat-tag {
      background: #fce8dc;
      color: var(--ember);
      border: 1px solid #f0c4a8;
      font-size: 0.73rem;
      padding: 3px 10px;
      border-radius: 20px;
    }

    /* Species cards */
    .species-grid {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .species-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #eef5ef;
      border-radius: 5px;
      padding: 6px 10px;
      gap: 8px;
    }

    .species-icon {
      width: 28px;
      height: 22px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .species-icon img {
      max-width: 28px;
      max-height: 22px;
      object-fit: contain;
    }

    .species-name {
      font-size: 0.82rem;
      font-style: italic;
      color: var(--forest);
      flex: 1;
    }

    .species-note {
      font-size: 0.68rem;
      color: var(--bark);
      margin-left: 4px;
    }

    .iucn-badge {
      font-size: 0.65rem;
      font-weight: 700;
      padding: 2px 7px;
      border-radius: 3px;
      letter-spacing: 0.05em;
      flex-shrink: 0;
      margin-left: 8px;
    }
    .iucn-CR { background: #c00; color: white; }
    .iucn-EN { background: #e84b00; color: white; }
    .iucn-VU { background: #e8a000; color: white; }
    .iucn-NT { background: #5a9; color: white; }
    .iucn-LC { background: #4a8c5c; color: white; }
    .iucn-DD { background: #999; color: white; }

    /* Photo strip at bottom */
    .photo-strip {
      margin-top: 8px;
    }

    .photo-nav-wrap {
      position: relative;
      border-radius: 5px;
      overflow: hidden;
      background: var(--canopy);
    }

    .photo-main {
      width: 100%;
      height: 200px;
      object-fit: cover;
      display: block;
    }

    .photo-nav-btn {
      position: absolute;
      top: 50%; transform: translateY(-50%);
      background: rgba(10, 26, 18, 0.65);
      border: none;
      color: white;
      width: 32px; height: 32px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 20px;
      line-height: 1;
      display: flex; align-items: center; justify-content: center;
      z-index: 2;
      transition: background 0.2s;
    }
    .photo-nav-btn:hover { background: rgba(10,26,18,0.9); }
    .photo-nav-btn.prev { left: 8px; }
    .photo-nav-btn.next { right: 8px; }

    .photo-counter {
      position: absolute;
      bottom: 6px; right: 8px;
      font-size: 0.65rem;
      color: rgba(255,255,255,0.8);
      background: rgba(0,0,0,0.35);
      padding: 1px 6px;
      border-radius: 10px;
    }

    .photo-thumbs {
      display: flex;
      gap: 5px;
      margin-top: 6px;
      overflow-x: auto;
      padding-bottom: 6px;
      scroll-behavior: smooth;
    }

    .photo-thumbs::-webkit-scrollbar { height: 5px; }
    .photo-thumbs::-webkit-scrollbar-track { background: var(--mist); border-radius: 3px; }
    .photo-thumbs::-webkit-scrollbar-thumb { background: var(--leaf); border-radius: 3px; }

    .photo-thumb {
      width: 64px; height: 48px;
      border-radius: 3px;
      border: 2px solid transparent;
      overflow: hidden;
      cursor: pointer;
      flex-shrink: 0;
      transition: border-color 0.2s;
    }
    .photo-thumb.active { border-color: var(--leaf); }
    .photo-thumb img { width: 100%; height: 100%; object-fit: cover; }

    /* ── Legend ─────────────────────────────────────────────────────────── */
    .legend {
      position: absolute;
      bottom: 30px; left: 14px;
      background: rgba(248, 244, 236, 0.95);
      border: 1px solid var(--mist);
      border-radius: 6px;
      padding: 12px 16px;
      font-size: 0.75rem;
      z-index: 800;
      min-width: 140px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.12);
    }

    .legend h4 {
      font-family: 'Playfair Display', serif;
      font-size: 0.8rem;
      color: var(--forest);
      margin-bottom: 8px;
    }

    .legend-item {
      display: flex; align-items: center; gap: 8px;
      margin-bottom: 5px;
      color: var(--ink);
    }

    .legend-swatch {
      width: 14px; height: 14px;
      border-radius: 2px;
      flex-shrink: 0;
    }

    /* ── Map overlays ────────────────────────────────────────────────────── */
    .instructions {
      position: absolute;
      top: 14px; left: 50%;
      transform: translateX(-50%);
      background: rgba(26, 58, 42, 0.88);
      color: var(--mist);
      font-size: 0.76rem;
      padding: 7px 16px;
      border-radius: 20px;
      letter-spacing: 0.04em;
      z-index: 800;
      pointer-events: none;
      white-space: nowrap;
      backdrop-filter: blur(4px);
      transition: opacity 0.5s;
    }

    .loading-overlay {
      position: absolute; inset: 0;
      background: rgba(240, 235, 224, 0.85);
      display: flex; align-items: center; justify-content: center;
      z-index: 2000;
      gap: 12px;
      font-size: 0.85rem;
      color: var(--forest);
      font-style: italic;
    }

    /* ── Leaflet overrides ───────────────────────────────────────────────── */
    .map-tooltip {
      padding: 6px 12px;
      background: var(--forest);
      color: var(--sand);
      border: none;
      border-radius: 4px;
      font-family: 'Source Serif 4', Georgia, serif;
      font-size: 0.8rem;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    }
    .leaflet-tooltip-top:before { border-top-color: var(--forest); }

    @media (max-width: 700px) {
      :root { --panel-w: 100vw; }
      #side-panel { position: absolute; top: 0; right: 0; bottom: 0; z-index: 900; border-left: none; border-top: 3px solid var(--leaf); }
    }
  </style>
</head>
<body>

<!-- ── Language Modal ─────────────────────────────────────────────────────── -->
<div id="lang-modal">
  <div class="lang-modal-title">Key Biodiversity Areas<br>Mozambique</div>
  <p class="lang-modal-subtitle">Select your language / Seleccione o seu idioma</p>
  <div class="lang-buttons">
    <button class="lang-btn" onclick="chooseLang('en')">English</button>
    <button class="lang-btn" onclick="chooseLang('pt')">Português</button>
  </div>
  <div class="lang-modal-logos">
    <img src="logos/WCS_LOGOTYPE-1024x365.webp" alt="WCS">
    <img src="logos/KBA-text-logo-colour.svg" alt="KBA">
    <img src="logos/portuguese-mozambique-people-s-republic-of-mozambique-emblem-of-mozambique-coat-of-arms-national-emblem-of-nepal.jpg" alt="Mozambique">
  </div>
</div>

<!-- ── Header ─────────────────────────────────────────────────────────────── -->
<header>
  <div class="header-left">
    <div class="header-emblem">🌿</div>
    <div>
      <h1 id="header-title">Key Biodiversity Areas</h1>
      <p class="subtitle" id="header-subtitle">Mozambique</p>
    </div>
  </div>
  <div class="header-right">
    <div class="site-count">
      <span id="kba-count">—</span> <span id="sites-label">Sites Mapped</span>
    </div>
    <div class="header-logos">
      <img src="logos/WCS_LOGOTYPE-1024x365.webp" alt="WCS">
      <img src="logos/KBA-text-logo-colour.svg" alt="KBA">
      <img src="logos/portuguese-mozambique-people-s-republic-of-mozambique-emblem-of-mozambique-coat-of-arms-national-emblem-of-nepal.jpg" alt="Mozambique">
    </div>
  </div>
</header>

<!-- ── App Body ────────────────────────────────────────────────────────────── -->
<div class="app-body">
  <div id="map">
    <div class="loading-overlay" id="loading">
      <span>🗺</span> Loading biodiversity data…
    </div>
    <div class="instructions" id="instructions">Click any highlighted area to explore a KBA site</div>
    <div class="legend">
      <h4 id="legend-title">KBA Sites</h4>
      <div class="legend-item">
        <div class="legend-swatch" style="background:#4a8c5c; border: 1px solid #2d5a3d;"></div>
        <span id="legend-kba">Terrestrial KBA</span>
      </div>
      <div class="legend-item">
        <div class="legend-swatch" style="background:#2196F3; border: 1px solid #0d4a7a;"></div>
        <span id="legend-marine">Marine KBA</span>
      </div>
    </div>
  </div>

  <div id="side-panel">
    <button class="panel-close" id="panel-close" title="Close">✕</button>

    <!-- Satellite image -->
    <div class="panel-satellite" id="panel-satellite">
      <div class="sat-placeholder" id="sat-placeholder">No satellite image</div>
    </div>

    <div class="panel-body" id="panel-body">
      <!-- Content injected by JS -->
    </div>
  </div>
</div>

<script src="kba-data.js"></script>
<script>
// ── Language ────────────────────────────────────────────────────────────────
window.LANG = 'en';

const UI = {
  en: {
    sitesLabel:     'Sites Mapped',
    instructions:   'Click any highlighted area to explore a KBA site',
    legendTitle:    'KBA Sites',
    legendKBA:      'Terrestrial KBA',
    legendMarine:   'Marine KBA',
    adminRegion:    'Admin Region',
    kbaArea:        'KBA Area',
    coordinates:    'Coordinates',
    protection:     'Protection Category',
    preexisting:    'Pre-existing Designation',
    criteria:       'KBA Criteria Triggered',
    description:    'Site Description',
    species:        'Trigger Species',
    threats:        'Main Threats',
    rationale:      'Rationale',
    photos:         'Photos',
    noPhoto:        'No satellite image',
    noPhotos:       'Photos coming soon',
    noThreats:      'No threats recorded.',
    noSpecies:      'Species data to be added.',
    noRationale:    'Rationale not yet recorded.',
    noDesc:         '',
  },
  pt: {
    sitesLabel:     'Sítios Mapeados',
    instructions:   'Clique numa área para explorar o sítio KBA',
    legendTitle:    'Sítios KBA',
    legendKBA:      'KBA Terrestre',
    legendMarine:   'KBA Marinha',
    adminRegion:    'Região Admin',
    kbaArea:        'Área da KBA',
    coordinates:    'Coordenadas',
    protection:     'Categoria de Protecção',
    preexisting:    'Designação Pré-existente',
    criteria:       'Critérios KBA Activados',
    description:    'Descrição do Local',
    species:        'Espécies Activadoras',
    threats:        'Principais Ameaças',
    rationale:      'Fundamentação',
    photos:         'Fotos',
    noPhoto:        'Sem imagem de satélite',
    noPhotos:       'Fotos em breve',
    noThreats:      'Sem ameaças registadas.',
    noSpecies:      'Dados de espécies a adicionar.',
    noRationale:    'Fundamentação não registada.',
    noDesc:         '',
  }
};

function chooseLang(lang) {
  window.LANG = lang;
  document.getElementById('lang-modal').style.display = 'none';
  applyUILanguage();
}

function applyUILanguage() {
  const t = UI[window.LANG];
  document.getElementById('sites-label').textContent    = t.sitesLabel;
  document.getElementById('instructions').textContent   = t.instructions;
  document.getElementById('legend-title').textContent   = t.legendTitle;
  document.getElementById('legend-kba').textContent     = t.legendKBA;
  document.getElementById('legend-marine').textContent  = t.legendMarine;
  document.getElementById('sat-placeholder').textContent= t.noPhoto;
}

// ── Map init ────────────────────────────────────────────────────────────────
const map = L.map('map', { center: [-18.0, 35.0], zoom: 6 });

L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
  attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors © <a href="https://carto.com/">CARTO</a>',
  subdomains: 'abcd',
  maxZoom: 19
}).addTo(map);

// ── State ───────────────────────────────────────────────────────────────────
let selectedLayer = null;
const panel = document.getElementById('side-panel');

const styleDefault  = { color:'#2d5a3d', weight:1.5, opacity:0.8, fillColor:'#4a8c5c', fillOpacity:0.35 };
const styleHover    = { color:'#1a3a2a', weight:2.5, fillOpacity:0.55 };
const styleSelected = { color:'#8b3a10', weight:2.5, fillColor:'#c4541a', fillOpacity:0.45 };

const styleMarine        = { color:'#0d4a7a', weight:1.5, opacity:0.8, fillColor:'#2196F3', fillOpacity:0.35 };
const styleMarineHover   = { color:'#083560', weight:2.5, fillOpacity:0.55 };

const MARINE_SITES = new Set(['Vamizi', 'Great Bazaruto', 'Tofo', 'Ponta do Ouro Marine Partial Reserve']);
const layerIsMarine = new Map();

// ── Photo navigation state ────────────────────────────────────────────────────
let photoList = [];
let photoIdx  = 0;

function navPhoto(dir) {
  if (photoList.length < 2) return;
  photoIdx = (photoIdx + dir + photoList.length) % photoList.length;
  const img = document.getElementById('main-photo');
  if (img) img.src = photoList[photoIdx];
  const counter = document.getElementById('photo-counter');
  if (counter) counter.textContent = `${photoIdx + 1} / ${photoList.length}`;
  document.querySelectorAll('.photo-thumb').forEach((th, i) => {
    th.classList.toggle('active', i === photoIdx);
    if (i === photoIdx) th.scrollIntoView({ inline: 'nearest', behavior: 'smooth', block: 'nearest' });
  });
}

// ── Load GeoJSON ─────────────────────────────────────────────────────────────
function loadKBAData() {
  if (typeof KBA_GEOJSON === 'undefined') {
    document.getElementById('loading').innerHTML = '<span>⚠️</span> kba-data.js not found.';
    return;
  }
  document.getElementById('loading').style.display = 'none';

  const geojsonLayer = L.geoJSON(KBA_GEOJSON, {
    style: feature => MARINE_SITES.has(feature.properties.name) ? styleMarine : styleDefault,
    onEachFeature(feature, layer) {
      const p = feature.properties;
      const marine = MARINE_SITES.has(p.name);
      layerIsMarine.set(layer, marine);
      const defStyle = marine ? styleMarine : styleDefault;
      const hvStyle  = marine ? styleMarineHover : styleHover;

      layer.bindTooltip(() => (window.LANG === 'pt' && p.name_pt) ? p.name_pt : (p.name || 'KBA'), {
        className: 'map-tooltip', direction: 'top', sticky: true,
      });

      layer.on('mouseover', function() { if (layer !== selectedLayer) layer.setStyle(hvStyle); });
      layer.on('mouseout',  function() { if (layer !== selectedLayer) layer.setStyle(defStyle); });
      layer.on('click',     function() { openPanel(feature, layer); });
    }
  }).addTo(map);

  const count = KBA_GEOJSON.features ? KBA_GEOJSON.features.length : 0;
  document.getElementById('kba-count').textContent = count;
  if (count > 0) { try { map.fitBounds(geojsonLayer.getBounds(), { padding: [30,30] }); } catch(e) {} }
}

// ── Open Panel ───────────────────────────────────────────────────────────────
function openPanel(feature, layer) {
  const p = feature.properties;
  const t = UI[window.LANG];
  const isPT = window.LANG === 'pt';

  // Style
  if (selectedLayer && selectedLayer !== layer) {
    selectedLayer.setStyle(layerIsMarine.get(selectedLayer) ? styleMarine : styleDefault);
  }
  selectedLayer = layer;
  layer.setStyle(styleSelected);

  // Satellite image
  const satEl = document.getElementById('panel-satellite');
  if (p.satellite_image) {
    satEl.innerHTML = `
      <span class="kba-badge">KBA</span>
      <img src="${p.satellite_image}" alt="Satellite" onerror="this.style.display='none'">
    `;
  } else {
    satEl.innerHTML = `
      <span class="kba-badge">KBA</span>
      <div class="sat-placeholder">${t.noPhoto}</div>
    `;
  }

  // Pick language-appropriate fields
  const siteName   = (isPT && p.name_pt)               ? p.name_pt               : (p.name || 'Unnamed Site');
  const desc       = (isPT && p.description_pt)        ? p.description_pt        : p.description;
  const rationale  = (isPT && p.kba_rationale_pt)      ? p.kba_rationale_pt      : p.kba_rationale;
  const protection = (isPT && p.protection_category_pt)? p.protection_category_pt: p.protection_category;
  const preexist   = (isPT && p.preexisting_designation_pt) ? p.preexisting_designation_pt : p.preexisting_designation;
  const threats    = isPT ? (p.threats_pt  || p.threats  || []) : (p.threats  || []);
  const species    = isPT ? (p.trigger_species_pt || p.trigger_species || []) : (p.trigger_species || []);

  // Meta grid
  const metaItems = [
    { label: t.kbaArea,     val: p.area_ha ? Number(p.area_ha).toLocaleString(undefined,{maximumFractionDigits:2}) + ' km²' : '—' },
    { label: t.coordinates, val: p.coordinates || p.admin_region || '—' },
    { label: t.protection,  val: protection || '—' },
    { label: t.preexisting, val: preexist || '—' },
  ];
  const metaHTML = `<div class="meta-grid">${metaItems.map(m =>
    `<div class="meta-item"><span class="meta-label">${m.label}</span><span class="meta-val">${m.val}</span></div>`
  ).join('')}</div>`;

  // Criteria badges
  const criteriaHTML = p.kba_criteria
    ? `<div class="section-label">${t.criteria}</div>
       <div class="criteria-row">${p.kba_criteria.split(',').map(c =>
         `<span class="criteria-badge">${c.trim()}</span>`).join('')}</div>`
    : '';

  // Description
  const descHTML = desc
    ? `<div class="section-label">${t.description}</div>
       <p class="section-text">${italiciseLatin(desc)}</p><div class="divider"></div>`
    : '';

  // Threats
  const threatsArr = Array.isArray(threats) ? threats : (threats ? [threats] : []);
  const threatsHTML = threatsArr.length > 0
    ? `<ul class="threats-list">${threatsArr.map(th => `<li class="threat-tag">${th}</li>`).join('')}</ul>`
    : `<p class="section-text">${t.noThreats}</p>`;

  // Species
  const speciesHTML = species.length > 0
    ? `<div class="species-grid">${species.map(s => {
        const status = s.iucn_status || '';
        const iucnClass = status ? `iucn-badge iucn-${status}` : 'iucn-badge iucn-DD';
        const note = s.note ? `<span class="species-note">(${s.note})</span>` : '';
        const iconHTML = s.icon
          ? `<div class="species-icon"><img src="${s.icon}" alt=""></div>`
          : `<div class="species-icon"></div>`;
        return `<div class="species-item">
          ${iconHTML}
          <span class="species-name"><em>${s.name}</em>${note}</span>
          ${status ? `<span class="${iucnClass}">${status}</span>` : ''}
        </div>`;
      }).join('')}</div>`
    : `<p class="section-text">${t.noSpecies}</p>`;

  // Photos
  const photos = p.photos || [];
  photoList = photos;
  photoIdx  = 0;
  let photosHTML = '';
  if (photos.length > 0) {
    const navBtns = photos.length > 1
      ? `<button class="photo-nav-btn prev" onclick="navPhoto(-1)">&#8249;</button>
         <button class="photo-nav-btn next" onclick="navPhoto(1)">&#8250;</button>
         <span class="photo-counter" id="photo-counter">1 / ${photos.length}</span>`
      : '';
    const thumbsHTML = photos.length > 1
      ? `<div class="photo-thumbs">${photos.map((src, i) =>
          `<div class="photo-thumb ${i===0?'active':''}" onclick="switchPhoto(${i})">
            <img src="${src}" alt="" loading="lazy" onerror="this.parentElement.style.display='none'">
          </div>`).join('')}</div>`
      : '';
    photosHTML = `<div class="section-label">${t.photos}</div>
      <div class="photo-strip">
        <div class="photo-nav-wrap">
          <img class="photo-main" id="main-photo" src="${photos[0]}" alt="${siteName}" onerror="this.style.display='none'">
          ${navBtns}
        </div>
        ${thumbsHTML}
      </div>`;
  }

  // Admin region line
  const regionLine = [p.admin_region, p.broad_region].filter(Boolean).join(' · ');

  // Assemble panel body
  document.getElementById('panel-body').innerHTML = `
    <div class="site-name">${siteName}</div>
    ${regionLine ? `<div class="site-region">${regionLine}</div>` : ''}

    ${metaHTML}
    ${criteriaHTML}

    <div class="divider"></div>

    ${descHTML}

    <div class="section-label">${t.species}</div>
    ${speciesHTML}

    <div class="divider"></div>

    <div class="section-label">${t.threats}</div>
    ${threatsHTML}

    <div class="divider"></div>

    <div class="section-label">${t.rationale}</div>
    <p class="section-text">${italiciseLatin(rationale) || t.noRationale}</p>

    ${photosHTML ? `<div class="divider"></div>${photosHTML}` : ''}
  `;

  panel.classList.add('open');

  const instr = document.getElementById('instructions');
  if (instr) { instr.style.opacity = '0'; setTimeout(() => instr.remove(), 600); }
}

// Wrap binomial Latin names (Genus species) in <em> tags
function italiciseLatin(text) {
  if (!text) return text;
  // Match: capital letter + lowercase word(s), followed by one or two lowercase words
  // Avoids matching ordinary sentence starts by requiring the second word to be lowercase
  return text.replace(/\b([A-Z][a-z]{1,})\s+([a-z]{2,}(?:\s+[a-z]{2,})?)\b/g,
    (match, genus, rest) => `<em>${genus} ${rest}</em>`);
}

function switchPhoto(idx) {
  photoIdx = idx;
  const img = document.getElementById('main-photo');
  if (img) img.src = photoList[idx];
  const counter = document.getElementById('photo-counter');
  if (counter) counter.textContent = `${idx + 1} / ${photoList.length}`;
  document.querySelectorAll('.photo-thumb').forEach((th, i) => th.classList.toggle('active', i === idx));
}

document.getElementById('panel-close').addEventListener('click', () => {
  panel.classList.remove('open');
  if (selectedLayer) {
    selectedLayer.setStyle(layerIsMarine.get(selectedLayer) ? styleMarine : styleDefault);
    selectedLayer = null;
  }
});

// ── Boot ─────────────────────────────────────────────────────────────────────
loadKBAData();
</script>
</body>
</html>
